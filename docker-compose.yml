version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: FirstLoveChurch.API/Dockerfile
    container_name: firstlove-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FirstLoveChurchDb;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=true;MultipleActiveResultSets=true
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - firstlove-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: firstlove-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Pass123
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Pass123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - firstlove-network

volumes:
  sqlserver-data:

networks:
  firstlove-network:
    driver: bridge
